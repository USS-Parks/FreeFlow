name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  foundation:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Vulkan SDK on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id KhronosGroup.VulkanSDK --exact --accept-package-agreements --accept-source-agreements --disable-interactivity
          $sdk = Get-ChildItem -LiteralPath C:\VulkanSDK -Directory |
            Sort-Object { [version]$_.Name } -Descending |
            Select-Object -First 1
          if ($null -eq $sdk) {
            throw "winget completed without creating a Vulkan SDK directory"
          }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Frontend gates
        run: |
          bun run lint
          bun run format:check
          bun run build
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject upstream runtime identities
        shell: bash
        run: ./scripts/check-foundation-provenance.sh
      - uses: dtolnay/rust-toolchain@stable
      - name: Audit Rust advisories
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
